<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <h1>SIGNUP FORM</h1>
    <form>
        <label for="name">Name</label>
        <input type="text" placeholder="Enter your name" id="name" required>
        <br> <br>
        <label for="email">Email</label>
        <input type="email" placeholder="Enter your email" id="email" required>
        <br> <br>
        <label for="password">Password</label>
        <input type="password" minlength="8" placeholder="Your password" id="password" required>
        <br> <br>
        <label for="tele">Telephone Number</label>
        <input type="tel" placeholder="03xxxxxxxxx" pattern="[0-9]{11}" id="tele">
        <br> <br>
        <label for="url">Instagram url</label>
        <input type="url" name="" id="url">
        <button>SignUp</button>

    </form>

    <img src="images/1.jpeg" alt="sunset" height="300" width="300">

</body>

</html>
